{{ define "base" }}
<!DOCTYPE html>
<html lang="en">

<head>
    <script src="https://unpkg.com/htmx.org@1.9.2"></script>
    <title>Shopping Manager</title>
</head>

<body>
    {{ if eq .TemplateName "DisplayInvoiceList" }}
        {{ template "invoicesList" .}}
    {{ else if eq .TemplateName "DisplayInvoiceSummary" }}
        {{ template "invoicesSummary" .}}
    {{ else }}
    <h1>Are you lost?</h1>
    {{ end }}
</body>
<footer>
    {{ template "footer" .}}
</footer>

</html>
{{ end }}
