name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Build & vet
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: Generate templates
        run: templ generate

      - name: Build
        run: go build -o parser60 .

      - name: Vet
        run: go vet ./...

  release:
    name: Release - ${{ matrix.platform.os_name }}
    if: startsWith(github.ref, 'refs/tags/')
    needs: [check]
    runs-on: ${{ matrix.platform.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os_name: Linux-x86_64
            os: ubuntu-latest
            goos: linux
            goarch: amd64
            name: parser60-linux-x86_64.tar.gz
          - os_name: macOS-aarch64
            os: macos-latest
            goos: darwin
            goarch: arm64
            name: parser60-macos-aarch64.tar.gz
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: Generate templates
        run: templ generate

      - name: Build release binary
        env:
          GOOS: ${{ matrix.platform.goos }}
          GOARCH: ${{ matrix.platform.goarch }}
        run: go build -ldflags="-s -w" -o parser60 .

      - name: Package
        run: tar czvf ${{ matrix.platform.name }} parser60

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3.0.1
        with:
          files: ${{ matrix.platform.name }}
          generate_release_notes: true
